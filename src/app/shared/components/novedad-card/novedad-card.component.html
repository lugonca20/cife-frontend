<a [routerLink]="['/novedades', novedad.id]"
   class="card-cife flex flex-col gap-3 h-full hover:border-cife-primary
          transition-colors cursor-pointer block">

  <div class="bg-cife-soft rounded-lg h-40 overflow-hidden flex items-center
              justify-center">
    <img *ngIf="novedad.imagenes && novedad.imagenes.length > 0"
         [src]="novedad.imagenes[0]"
         [alt]="novedad.titulo"
         class="w-full h-full object-cover object-center"/>
    <svg *ngIf="!novedad.imagenes || novedad.imagenes.length === 0"
         viewBox="0 0 24 24" fill="none" stroke="#2A8C7A" stroke-width="1.5"
         stroke-linecap="round" class="w-10 h-10 opacity-40">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M3 9h18M9 21V9"/>
    </svg>
  </div>

  <p class="text-cife-muted text-xs">
    {{ novedad.fechaPublicacion | date:'d \'de\' MMMM, yyyy':'':'es' }}
  </p>

  <h3 class="font-display text-cife-text text-base leading-snug">
    {{ novedad.titulo }}
  </h3>

  <p *ngIf="novedad.subtitulo" class="text-cife-muted text-sm italic">
    {{ novedad.subtitulo }}
  </p>

  <p class="text-cife-muted text-sm leading-relaxed flex-1 line-clamp-3">
    {{ novedad.descripcion }}
  </p>

  <p class="text-cife-primary text-sm font-medium mt-auto">
    Leer más →
  </p>

</a>
