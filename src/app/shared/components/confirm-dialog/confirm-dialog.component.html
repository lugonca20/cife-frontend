<div *ngIf="visible"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4">
  <div class="bg-white rounded-2xl shadow-lg max-w-sm w-full p-6 flex flex-col gap-4">

    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-red-50 rounded-full flex items-center justify-center flex-shrink-0">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"
             stroke-linecap="round" class="w-5 h-5">
          <path d="M12 9v4M12 17h.01"/>
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <p class="text-cife-text text-sm leading-relaxed">{{ mensaje }}</p>
    </div>

    <div class="flex gap-3 justify-end">
      <button (click)="cancelado.emit()"
              class="btn-outline text-sm px-4 py-2">
        Cancelar
      </button>
      <button (click)="confirmado.emit()"
              class="bg-red-500 hover:bg-red-600 text-white text-sm font-medium
                     px-4 py-2 rounded-lg transition-colors">
        Sí, eliminar
      </button>
    </div>

  </div>
</div>
