<div *ngIf="imagenes.length > 0"
     class="relative group rounded-2xl overflow-hidden bg-cife-soft"
     (touchstart)="onTouchStart($event)"
     (touchend)="onTouchEnd($event)">

  <img [src]="imagenes[indiceActivo]"
       [alt]="alt"
       class="w-full h-48 md:h-[32rem] object-cover transition-opacity duration-300"/>

  <ng-container *ngIf="imagenes.length > 1">

    <!-- Flecha izquierda -->
    <button (click)="anterior()"
            class="absolute left-3 top-1/2 -translate-y-1/2
                   bg-black/30 hover:bg-black/50 text-white
                   rounded-full w-9 h-9 flex items-center justify-center
                   opacity-100 md:opacity-0 md:group-hover:opacity-100
                   transition-opacity duration-200">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>

    <!-- Flecha derecha -->
    <button (click)="siguiente()"
            class="absolute right-3 top-1/2 -translate-y-1/2
                   bg-black/30 hover:bg-black/50 text-white
                   rounded-full w-9 h-9 flex items-center justify-center
                   opacity-100 md:opacity-0 md:group-hover:opacity-100
                   transition-opacity duration-200">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
      </svg>
    </button>

    <!-- Puntos indicadores -->
    <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-2">
      <button *ngFor="let img of imagenes; let i = index"
              (click)="indiceActivo = i"
              class="h-2 rounded-full transition-all duration-200"
              [ngClass]="indiceActivo === i ? 'w-4 bg-white' : 'w-2 bg-white/40'">
      </button>
    </div>

  </ng-container>
</div>
