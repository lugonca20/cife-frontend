<nav class="bg-cife-primary shadow-sm relative z-50">
  <div class="max-w-6xl mx-auto px-4 py-2 flex items-center justify-between">

    <a routerLink="/inicio" (click)="cerrarMenu()" class="flex items-center">
      <img src="assets/logo_cife.png" alt="CIFE" class="h-20 w-20 object-contain"/>
    </a>

    <div class="hidden md:flex items-center gap-1">
      <a routerLink="/inicio" routerLinkActive="bg-white/20 text-white"
         [routerLinkActiveOptions]="{exact: true}"
         class="text-white/80 hover:text-white hover:bg-white/10 text-sm
                px-4 py-2 rounded-lg transition-colors">
        Inicio
      </a>
      <a routerLink="/cursos" routerLinkActive="bg-white/20 text-white"
         class="text-white/80 hover:text-white hover:bg-white/10 text-sm
                px-4 py-2 rounded-lg transition-colors">
        Cursos
      </a>
      <a routerLink="/novedades" routerLinkActive="bg-white/20 text-white"
         class="text-white/80 hover:text-white hover:bg-white/10 text-sm
                px-4 py-2 rounded-lg transition-colors">
        Novedades
      </a>
      <a routerLink="/quienes-somos" routerLinkActive="bg-white/20 text-white"
         class="text-white/80 hover:text-white hover:bg-white/10 text-sm
                px-4 py-2 rounded-lg transition-colors">
        ¿Quiénes somos?
      </a>
      <a routerLink="/contacto" routerLinkActive="bg-white/20 text-white"
         class="text-white/80 hover:text-white hover:bg-white/10 text-sm
                px-4 py-2 rounded-lg transition-colors">
        Contacto
      </a>
    </div>

    <button class="md:hidden text-white p-2 rounded-lg hover:bg-white/10
                   transition-colors" (click)="toggleMenu()">
      <svg *ngIf="!menuAbierto" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round"
           class="w-6 h-6">
        <path d="M3 6h18M3 12h18M3 18h18"/>
      </svg>
      <svg *ngIf="menuAbierto" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round"
           class="w-6 h-6">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>

  </div>

  <div *ngIf="menuAbierto"
       class="md:hidden bg-cife-dark border-t border-white/10 px-4 pb-4
              flex flex-col gap-1">
    <a routerLink="/inicio" (click)="cerrarMenu()"
       class="text-white/80 hover:text-white text-sm py-3
              border-b border-white/10 transition-colors">
      Inicio
    </a>
    <a routerLink="/cursos" (click)="cerrarMenu()"
       class="text-white/80 hover:text-white text-sm py-3
              border-b border-white/10 transition-colors">
      Cursos
    </a>
    <a routerLink="/novedades" (click)="cerrarMenu()"
       class="text-white/80 hover:text-white text-sm py-3
              border-b border-white/10 transition-colors">
      Novedades
    </a>
    <a routerLink="/quienes-somos" (click)="cerrarMenu()"
       class="text-white/80 hover:text-white text-sm py-3
              border-b border-white/10 transition-colors">
      ¿Quiénes somos?
    </a>
    <a routerLink="/contacto" (click)="cerrarMenu()"
       class="text-white/80 hover:text-white text-sm py-3 transition-colors">
      Contacto
    </a>
  </div>

</nav>
