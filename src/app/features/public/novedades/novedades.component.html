<div class="max-w-6xl mx-auto px-4 py-10">

  <div class="mb-8">
    <p class="section-label">Noticias</p>
    <h1 class="section-title">Novedades</h1>
    <p class="text-cife-muted text-sm leading-relaxed">
      Enterate de todo lo que está pasando en CIFE.
    </p>
  </div>

  <app-loading-spinner *ngIf="cargando" />

  <div *ngIf="!cargando" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
    <app-novedad-card *ngFor="let novedad of novedades" [novedad]="novedad" />
  </div>

  <div *ngIf="!cargando && novedades.length === 0"
       class="text-center py-16 text-cife-muted text-sm">
    No hay novedades publicadas por el momento.
  </div>

</div>
