<div class="min-h-screen bg-cife-bg">
  <div class="max-w-4xl mx-auto px-4 py-8">

    <div class="flex items-center justify-between mb-6">
      <div>
        <a routerLink="/admin/dashboard"
           class="border border-cife-border hover:border-cife-primary text-cife-muted
                  hover:text-cife-primary text-xs px-3 py-1.5 rounded-lg
                  transition-colors mb-4 inline-block">
          ← Atrás
        </a>
        <h1 class="font-display font-medium text-cife-text text-xl">
          Consultas
          <span *ngIf="sinLeer > 0"
                class="ml-2 bg-red-100 text-red-600 text-xs px-2 py-0.5 rounded-full">
            {{ sinLeer }} sin leer
          </span>
        </h1>
      </div>
    </div>

    <div class="flex gap-2 mb-6 flex-wrap">
      <button (click)="filtro = 'TODAS'"
              [class]="filtro === 'TODAS' ?
                       'btn-primary text-sm px-4 py-2' :
                       'btn-outline text-sm px-4 py-2'">
        Todas
      </button>
      <button (click)="filtro = 'SIN_LEER'"
              [class]="filtro === 'SIN_LEER' ?
                       'btn-primary text-sm px-4 py-2' :
                       'btn-outline text-sm px-4 py-2'">
        Sin leer
      </button>
      <button (click)="filtro = 'LEIDAS'"
              [class]="filtro === 'LEIDAS' ?
                       'btn-primary text-sm px-4 py-2' :
                       'btn-outline text-sm px-4 py-2'">
        Leídas
      </button>
    </div>

    <app-loading-spinner *ngIf="cargando" />

    <div *ngIf="!cargando && consultasFiltradas.length === 0"
         class="text-center py-16 text-cife-muted text-sm">
      No hay consultas en esta categoría.
    </div>

    <div *ngIf="!cargando" class="flex flex-col gap-3">
      <div *ngFor="let consulta of consultasFiltradas"
           class="card-cife transition-colors"
           [class.border-cife-primary]="!consulta.leida"
           [class.bg-cife-soft]="!consulta.leida">

        <div class="flex flex-col gap-2 mb-3 md:flex-row md:items-start md:justify-between md:gap-4">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="font-medium text-cife-text text-sm">
              {{ consulta.nombre }}
            </span>
            <span class="text-cife-muted text-xs">{{ consulta.email }}</span>
            <span *ngIf="!consulta.leida"
                  class="bg-red-100 text-red-600 text-xs px-2 py-0.5 rounded-full">
              Nueva
            </span>
          </div>
          <div class="flex items-center gap-3 flex-wrap md:flex-shrink-0">
            <p class="text-cife-muted text-xs">
              {{ consulta.fechaEnvio | date:'d/MM/yyyy HH:mm' }}
            </p>
            <button *ngIf="!consulta.leida"
                    (click)="marcarLeida(consulta)"
                    class="text-cife-primary text-xs hover:text-cife-dark
                           transition-colors font-medium">
              Marcar como leída
            </button>
            <span *ngIf="consulta.leida"
                  class="text-cife-muted text-xs">
              Leída
            </span>
            <button (click)="confirmarEliminar(consulta)"
                    class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200
                           text-xs px-3 py-1.5 rounded-lg transition-colors">
              Eliminar
            </button>
          </div>
        </div>

        <p class="text-cife-text text-sm leading-relaxed bg-white rounded-lg p-3
                  border border-cife-border">
          {{ consulta.mensaje }}
        </p>

      </div>
    </div>

</div>
  </div>
  <app-confirm-dialog
  [visible]="dialogVisible"
  [mensaje]="'¿Estás seguro que querés eliminar la consulta de ' + (consultaAEliminar?.nombre || '') + '? Esta acción no se puede deshacer.'"
  (confirmado)="eliminar()"
  (cancelado)="cancelar()" />
