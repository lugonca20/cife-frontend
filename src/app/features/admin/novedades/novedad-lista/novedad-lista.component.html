<div class="min-h-screen bg-cife-bg">
  <div class="max-w-5xl mx-auto px-4 py-8">

    <div class="flex items-center justify-between mb-6">
      <div>
        <a routerLink="/admin/dashboard"
           class="border border-cife-border hover:border-cife-primary text-cife-muted
                  hover:text-cife-primary text-xs px-3 py-1.5 rounded-lg
                  transition-colors mb-4 inline-block">
          ← Atrás
        </a>
        <h1 class="font-display font-medium text-cife-text text-xl">Novedades</h1>
      </div>
      <a routerLink="/admin/novedades/nueva" class="btn-primary text-sm">
        + Nueva novedad
      </a>
    </div>

    <app-loading-spinner *ngIf="cargando" />

    <div *ngIf="!cargando && novedades.length === 0"
         class="text-center py-16 text-cife-muted text-sm">
      No hay novedades publicadas todavía.
    </div>

    <div *ngIf="!cargando && novedades.length > 0" class="flex flex-col gap-3">
      <div *ngFor="let novedad of novedades"
           class="card-cife flex flex-col sm:flex-row sm:items-center justify-between gap-4">
        <div class="flex-1">
          <p class="text-xs text-cife-muted mb-1">
            {{ novedad.fechaPublicacion | date:'d \'de\' MMMM, yyyy':'':'es' }}
          </p>
          <p class="font-medium text-cife-text text-sm">{{ novedad.titulo }}</p>
          <p *ngIf="novedad.subtitulo" class="text-cife-muted text-xs italic mt-0.5">
            {{ novedad.subtitulo }}
          </p>
          <p class="text-cife-muted text-xs mt-1 line-clamp-1">
            {{ novedad.descripcion }}
          </p>
        </div>
        <div class="flex gap-2 flex-shrink-0">
          <a [routerLink]="['/admin/novedades', novedad.id, 'editar']"
             class="btn-outline text-xs px-3 py-1.5">
            Editar
          </a>
          <button (click)="confirmarEliminar(novedad)"
                  class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200
                         text-xs px-3 py-1.5 rounded-lg transition-colors">
            Eliminar
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<app-confirm-dialog
  [visible]="dialogVisible"
  [mensaje]="'¿Estás seguro que querés eliminar la novedad \'' + (novedadAEliminar?.titulo || '') + '\'?'"
  (confirmado)="eliminar()"
  (cancelado)="cancelar()" />
